<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>auto-fit と auto-fill の比較</title>
  <link rel="stylesheet" href="card-grid-autofit-autofill.css">
</head>
<body>
  <h1 class="page-title">auto-fit と auto-fill の比較</h1>

  <section class="demo">
    <h2 class="section-title">auto-fit</h2>
    <p class="demo__note">余ったスペースをカードが伸びて埋める（空の列は生じない）</p>
    <div class="container container--autofit">
      <div class="card"><h2 class="card__title">カード 1</h2><p class="card__text">ここに本文が入ります。</p></div>
      <div class="card"><h2 class="card__title">カード 2</h2><p class="card__text">ここに本文が入ります。</p></div>
      <div class="card"><h2 class="card__title">カード 3</h2><p class="card__text">ここに本文が入ります。</p></div>
      <div class="card"><h2 class="card__title">カード 4</h2><p class="card__text">ここに本文が入ります。</p></div>
    </div>
  </section>

  <section class="demo">
    <h2 class="section-title">auto-fill</h2>
    <p class="demo__note">幅に応じた空の列が生成される（カードは伸びず、隙間が空く）</p>
    <div class="container container--autofill">
      <div class="card"><h2 class="card__title">カード 1</h2><p class="card__text">ここに本文が入ります。</p></div>
      <div class="card"><h2 class="card__title">カード 2</h2><p class="card__text">ここに本文が入ります。</p></div>
      <div class="card"><h2 class="card__title">カード 3</h2><p class="card__text">ここに本文が入ります。</p></div>
      <div class="card"><h2 class="card__title">カード 4</h2><p class="card__text">ここに本文が入ります。</p></div>
    </div>
  </section>
</body>
</html>
