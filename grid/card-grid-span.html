<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>まばらなタイル（span）</title>
  <link rel="stylesheet" href="card-grid-span.css">
</head>
<body>
  <h1 class="page-title">まばらなタイル</h1>
  <p class="demo__note">grid-column / grid-row の span で、特定のタイルを横長・縦長にする（dense で隙間を自動で詰める）</p>
  <div class="container">
    <div class="card wide"><h2 class="card__title">Wide</h2><p class="card__text">1: span 2 で横2列分。</p></div>
    <div class="card"><h2 class="card__title">カード</h2><p class="card__text">2: 通常サイズ。</p></div>
    <div class="card tall"><h2 class="card__title">Tall</h2><p class="card__text">3: span 2 で縦2行分。</p></div>
    <div class="card big"><h2 class="card__title">Big</h2><p class="card__text">4: 横2×縦2の大タイル。</p></div>
    <div class="card"><h2 class="card__title">カード</h2><p class="card__text">5: 通常サイズ。</p></div>
    <div class="card"><h2 class="card__title">カード</h2><p class="card__text">6: 通常サイズ。</p></div>
    <div class="card wide"><h2 class="card__title">Wide</h2><p class="card__text">7: span 2 で横2列分。</p></div>
    <div class="card"><h2 class="card__title">カード</h2><p class="card__text">8: 通常サイズ。</p></div>
  </div>
</body>
</html>
