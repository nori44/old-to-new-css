<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>03 margin-inline 実践</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #f1f5f9;
      margin: 0;
    }
    .container {
      max-width: 1200px;
      margin-inline: auto;
    }
    .section {
      background: #c9ddf6;
      box-sizing: border-box;
    }
    .section h2 {
      margin: 0 0 16px;
      font-size: 1.2em;
      color: #1e40af;
    }
    .card {
      background: #fff;
      padding: 20px;
    }
    .card p {
      margin: 0;
      color: #334155;
    }
    code {
      background: #e2e8f0;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>03 中央配置・左配置 実践</h1>
    <section class="section">
      <h2>セクションタイトル</h2>
      <div class="card">
        <p><code>margin-inline</code> や <code>padding-block</code> を使って余白を調整してみましょう。</p>
      </div>
    </section>
  </div>
</body>
</html>
