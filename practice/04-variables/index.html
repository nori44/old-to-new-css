<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>04 CSS変数・ネスト 実践</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      padding: 40px;
    }
    .container {
      max-width: 1200px;
      margin-inline: auto;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .card {
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      width: 220px;
      transition: opacity 0.2s;
    }
    .card h2 {
      margin: 0 0 8px;
    }
    .card p {
      margin: 0;
      font-size: 0.9em;
      color: #64748b;
    }
  </style>
</head>
<body>
  <h1>04 CSS変数・ネスト 実践</h1>
  <div class="container">
    <div class="card">
      <h2>カードの見出し</h2>
      <p>CSS変数で色・余白を一元管理できます。</p>
    </div>
    <div class="card">
      <h2>別のカード</h2>
      <p>ホバーすると opacity が変わります。</p>
    </div>
    <div class="card">
      <h2>3つ目のカード</h2>
      <p>:root の変数を変えるだけで全体が一括変更されます。</p>
    </div>
  </div>
</body>
</html>
